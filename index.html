<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EatPan — Your Recipe Universe</title>
  <meta name="description" content="EatPan — recipe management, task planning, and lifestyle app with RPG-style interface">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Work+Sans:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&family=Noto+Serif:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="./src/styles/tokens.css">
  <link rel="stylesheet" href="./src/styles/layout.css">
  <link rel="stylesheet" href="./src/styles/themes.css">
  <link rel="stylesheet" href="./src/styles/responsive.css">
  <link rel="stylesheet" href="./src/components/clock/clock.css">
  <link rel="stylesheet" href="./src/components/menu/menu.css">
  <link rel="stylesheet" href="./src/components/auth_panel/auth_panel.css">
  <link rel="stylesheet" href="./src/components/user_profile/user_profile.css">
</head>
<body>

  <div id="app">
    <!-- ==========================================
         HEADER — always visible on ALL screen sizes
         Mobile: profile(left) + clock(center) + empty(right)
         Desktop: profile(left) + clock(center) + menu(right)
         ========================================== -->
    <header id="app-header" class="rpg-header-bar">
      <div class="header-left">
        <button id="btn-user" class="header-icon-btn header-avatar-btn" aria-label="Profile">
          <i data-lucide="log-in" style="width:20px;height:20px;"></i>
        </button>
      </div>
      <div class="header-center">
        <span id="header-clock" class="header-clock-display">00:00</span>
      </div>
      <div class="header-right">
        <!-- Desktop only: menu button here -->
        <button id="btn-menu-desktop" class="header-icon-btn desktop-only fab-menu" aria-label="Menu">
          <i data-lucide="menu" style="width:22px;height:22px;"></i>
        </button>
        <!-- Desktop only: back button -->
        <button id="btn-back-desktop" class="header-icon-btn desktop-only fab-back" aria-label="Back">
          <i data-lucide="arrow-left" style="width:20px;height:20px;"></i>
        </button>
      </div>
    </header>

    <!-- ==========================================
         MAIN CONTENT AREA — carousel + overlays
         ========================================== -->
    <main id="main-content">
      <!-- Sector Carousel -->
      <div id="sector-carousel">
        <!-- Sectors injected by main.js -->
      </div>

      <!-- Menu Overlay (within main-content, doesn't cover header/footer) -->
      <div id="menu-overlay">
        <div id="menu-content" class="rpg-panel rpg-panel--ornate">
          <!-- Menu.js injects content here -->
        </div>
      </div>
    </main>

    <!-- ==========================================
         FOOTER — mobile only (<1024px)
         Only: [Back ←] [Menu ≡]
         Back appears dynamically in active-mode
         ========================================== -->
    <footer id="app-footer" class="rpg-footer-bar">
      <div class="footer-controls">
        <button id="btn-menu-mobile" class="footer-fab fab-menu" aria-label="Menu">
          <i data-lucide="menu" style="width:18px;height:18px;"></i>
        </button>
        <button id="btn-back-mobile" class="footer-fab fab-back" aria-label="Back">
          <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
        </button>
      </div>
    </footer>
  </div>

  <!-- Main Application Entry -->
  <script type="module" src="./main.js"></script>
</body>
</html>
