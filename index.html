<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EatPan — Your Recipe Universe</title>
  <meta name="description" content="EatPan — recipe management, task planning, and lifestyle app with RPG-style interface">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Work+Sans:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&family=Noto+Serif:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Identity Services (One Tap / FedCM) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="./src/styles/tokens.css">
  <link rel="stylesheet" href="./src/styles/layout.css">
  <link rel="stylesheet" href="./src/styles/themes.css">
  <link rel="stylesheet" href="./src/styles/responsive.css">
  
  <!-- UI Kit Atoms -->
  <link rel="stylesheet" href="./src/components/ui_kit/sigil_diamond/sigil_diamond.css">
  <link rel="stylesheet" href="./src/components/ui_kit/core_avatar/core_avatar.css">
  <link rel="stylesheet" href="./src/components/ui_kit/flux_stat_bar/flux_stat_bar.css">
  <link rel="stylesheet" href="./src/components/ui_kit/flux_segment_bar/flux_segment_bar.css">
  <link rel="stylesheet" href="./src/components/ui_kit/edge_galtel/edge_galtel.css">
  <link rel="stylesheet" href="./src/components/ui_kit/glyph_nav/glyph_nav.css">
  <link rel="stylesheet" href="./src/components/ui_kit/glyph_button/glyph_button.css">
  <link rel="stylesheet" href="./src/components/ui_kit/spark_ribbon/spark_ribbon.css">
  
  <!-- Composite Components -->
  <link rel="stylesheet" href="./src/components/arc_bento_header_full/arc_bento_header_full.css">
  <link rel="stylesheet" href="./src/components/arc_bento_header/arc_bento_header.css">
  
  <!-- Legacy Components (To be replaced) -->
  <link rel="stylesheet" href="./src/components/clock/clock.css">
  <link rel="stylesheet" href="./src/components/menu/menu.css">
  <link rel="stylesheet" href="./src/components/auth_panel/auth_panel.css">
  <link rel="stylesheet" href="./src/components/user_profile/user_profile.css">
</head>
<body>

  <div id="app">
    <!-- ==========================================
         HEADER — always visible on ALL screen sizes
         (Now mounted dynamically via ArcBentoHeader)
         ========================================== -->
    <div id="arc-header-mount"></div>

    <!-- ==========================================
         MAIN CONTENT AREA — carousel + overlays
         ========================================== -->
    <main id="main-content">
      <!-- Sector Carousel -->
      <div id="sector-carousel">
        <!-- Sectors injected by main.js -->
      </div>

      <!-- Auth Overlay (slides from left) -->
      <div id="auth-overlay" class="auth-overlay"></div>

      <!-- Menu Overlay (within main-content, doesn't cover header/footer) -->
      <div id="menu-overlay">
        <div id="menu-content" class="rpg-panel rpg-panel--ornate">
          <!-- Menu.js injects content here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Main Application Entry -->
  <script type="module" src="./main.js"></script>
</body>
</html>
