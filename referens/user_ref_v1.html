<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Header - Bento Style</title>

    <!-- Подключение фэнтезийных шрифтов -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Подключение иконок Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =========================================
           ОБЩИЕ CSS ПЕРЕМЕННЫЕ (Из UI-Кита)
           ========================================= */
        :root {
            --bg-main: #14110f;
            --bg-panel-dark: #1e2124;

            --gold-light: #fcebc4;
            --gold-base: #c19b54;
            --gold-dark: #8c6931;
            --gold-shadow: #3a2a0d;
            --gold-very-dark: #1a1205;

            --parchment-light: #e3c792;
            --parchment-base: #c89e5d;
            --parchment-dark: #9e7539;

            --font-title: 'Cinzel', serif;
            --font-text: 'Merriweather', serif;

            /* Цвета для баров */
            --hp-top: #d65656;
            --hp-bottom: #6b1919;
            --mp-top: #52c2d6;
            --mp-bottom: #154c5e;
            --stamina-top: #e8d058;
            --stamina-bottom: #9e821b;

            /* Цвет фона страницы, нужен для трюка с вогнутым углом */
            --body-bg: #080808;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--body-bg);
            font-family: var(--font-text);
            color: #fff;
            padding: 20px;
            /* Сетка на фоне для наглядности (как на референсах) */
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* =========================================
           ОБЕРТКА ХЕДЕРА
           ========================================= */
        .rpg-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            pointer-events: none;
            /* Чтобы клики проходили сквозь пустоты */
        }

        /* Общие стили для панелей (Bento Style) */
        .bento-panel {
            pointer-events: auto;
            background: linear-gradient(135deg, #2a2118, #110c08);
            border: 2px solid var(--gold-dark);
            box-shadow:
                inset 0 0 30px rgba(0, 0, 0, 0.9),
                0 10px 20px rgba(0, 0, 0, 0.7);
            position: relative;
            padding: 15px;
        }

        /* =========================================
           ЛЕВАЯ ПАНЕЛЬ (ЮЗЕР И СТАТЫ)
           ========================================= */
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 450px;

            /* Геометрия: ВЛ=90, НЛ=90, ВП=Внешний радиус, НП=Вогнутый радиус (через псевдо) */
            border-radius: 0 40px 0 0;
            border-left: none;
            /* Прижимаем к левому краю, если нужно */
        }

        /* ТРЮК: Внутренний радиус (Concave corner) для правого нижнего угла */
        .header-left::after {
            content: '';
            position: absolute;
            bottom: -2px;
            /* Перекрываем нижний бордер */
            right: -2px;
            /* Перекрываем правый бордер */
            width: 40px;
            height: 40px;
            background-color: var(--body-bg);
            /* Цвет фона вокруг */
            border-top-left-radius: 30px;
            /* Тот самый вогнутый скругленный угол */
            border-top: 2px solid var(--gold-dark);
            border-left: 2px solid var(--gold-dark);
            /* Тень для создания объема вогнутости */
            box-shadow: inset 5px 5px 10px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        /* =========================================
           ПРАВАЯ ПАНЕЛЬ (МЕНЮ)
           ========================================= */
        .header-right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 25px 15px 15px;

            /* Геометрия: ВП=90, НП=90, ВЛ=Внешний радиус, НЛ=Вогнутый радиус */
            border-radius: 40px 0 0 0;
            border-right: none;
        }

        /* ТРЮК: Внутренний радиус (Concave corner) для левого нижнего угла */
        .header-right::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: -2px;
            width: 40px;
            height: 40px;
            background-color: var(--body-bg);
            border-top-right-radius: 30px;
            border-top: 2px solid var(--gold-dark);
            border-right: 2px solid var(--gold-dark);
            box-shadow: inset -5px 5px 10px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        /* =========================================
           АВАТАРКА (ШЕСТИУГОЛЬНИК С ФЛАЖКОМ)
           ========================================= */
        .avatar-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -5px;
            z-index: 20;
        }

        /* Двойной бордер для гекса (из UI-кита) */
        .hex-outer {
            padding: 3px;
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.8));
        }

        .hex-inner-gap {
            padding: 2px;
            background: #1a1205;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .hex-avatar {
            width: 70px;
            height: 80px;
            background: radial-gradient(circle at 50% 30%, #444, #111);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hex-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        /* Выезжающий флажок уровня */
        .level-ribbon {
            margin-top: -10px;
            /* Задвигаем под гексагон */
            background: linear-gradient(to bottom, var(--gold-base), var(--gold-dark));
            padding: 12px 15px 6px 15px;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 85%, 0 100%);
            color: #1a0f04;
            font-family: var(--font-title);
            font-weight: 700;
            font-size: 12px;
            text-align: center;
            z-index: -1;
            filter: drop-shadow(0 4px 5px rgba(0, 0, 0, 0.8));
        }

        /* =========================================
           БЛОК СТАТОВ (ИМЯ + БАРЫ)
           ========================================= */
        .stats-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 20;
            /* Чтобы быть поверх "вырезов" */
            padding-right: 25px;
            /* Отступ от внутреннего радиуса */
        }

        /* Строка 1: Имя и Логотипчики */
        .player-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .player-name {
            font-family: var(--font-title);
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 3px #000, 0 0 10px var(--gold-dark);
            letter-spacing: 1px;
        }

        .player-badges {
            display: flex;
            gap: 5px;
        }

        .badge-icon {
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--gold-dark);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-light);
            box-shadow: inset 0 0 5px #000;
        }

        .badge-icon i {
            width: 12px;
            height: 12px;
        }

        /* Базовые стили для баров */
        .bar-wrapper {
            position: relative;
            width: 100%;
            height: 14px;
            background: #080605;
            border: 1px solid #000;
            border-radius: 4px;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.9), 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 2px;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-title);
            font-size: 9px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            z-index: 2;
        }

        /* Строка 2: Health Bar */
        .bar-health .bar-fill {
            width: 85%;
            background: linear-gradient(to bottom, var(--hp-top), var(--hp-bottom));
        }

        /* Строка 3: Mana Bar */
        .bar-mana .bar-fill {
            width: 60%;
            background: linear-gradient(to bottom, var(--mp-top), var(--mp-bottom));
        }

        /* Строка 4: Сегментированный бар (7-8 этапов) */
        .bar-segmented {
            display: flex;
            gap: 3px;
            height: 12px;
            margin-top: 2px;
        }

        .segment {
            flex: 1;
            background: #080605;
            border: 1px solid #000;
            border-radius: 2px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        .segment.filled::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            right: 1px;
            bottom: 1px;
            background: linear-gradient(to bottom, var(--stamina-top), var(--stamina-bottom));
            border-radius: 1px;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.4);
        }

        /* =========================================
           КНОПКА МЕНЮ (ИЗ UI КИТА)
           ========================================= */
        /* Используем стиль border-convex из оригинального файла */
        .menu-btn {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--gold-light);
            transition: all 0.1s;
            z-index: 20;
            /* Поверх выреза */

            border: 2px solid var(--gold-base);
            background: radial-gradient(circle at 50% 50%, #52c2d6 0%, #154c5e 60%, #0d3644 100%);
            /* Берем синюю тему */
            box-shadow:
                inset 0 0 15px rgba(255, 255, 255, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.8),
                0 5px 10px rgba(0, 0, 0, 0.6);
        }

        .menu-btn i {
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.8));
            width: 28px;
            height: 28px;
        }

        .menu-btn:active {
            box-shadow:
                inset 0 0 10px rgba(255, 255, 255, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.9),
                0 2px 5px rgba(0, 0, 0, 0.8);
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <!-- Главный контейнер шапки -->
    <header class="rpg-header">

        <!-- ЛЕВЫЙ БЛОК: Статус игрока (Bento Left) -->
        <div class="bento-panel header-left">

            <!-- Аватарка шестиугольник + Флажок -->
            <div class="avatar-container">
                <div class="hex-outer">
                    <div class="hex-inner-gap">
                        <div class="hex-avatar">
                            <!-- Иконка как заглушка вместо картинки -->
                            <i data-lucide="skull" style="color: var(--gold-light); width: 35px; height: 35px;"></i>
                        </div>
                    </div>
                </div>
                <div class="level-ribbon">LV 42</div>
            </div>

            <!-- Блок статов: 4 строки -->
            <div class="stats-container">

                <!-- 1. Имя и логотипчики -->
                <div class="player-header-row">
                    <div class="player-name">SIR GALAHAD</div>
                    <div class="player-badges">
                        <div class="badge-icon"><i data-lucide="crown"></i></div>
                        <div class="badge-icon" style="border-color: #52c2d6; color: #52c2d6;"><i data-lucide="gem"></i>
                        </div>
                    </div>
                </div>

                <!-- 2. Health Bar -->
                <div class="bar-wrapper bar-health">
                    <div class="bar-text">3450 / 4000</div>
                    <div class="bar-fill"></div>
                </div>

                <!-- 3. Mana Bar -->
                <div class="bar-wrapper bar-mana">
                    <div class="bar-text">1200 / 2500</div>
                    <div class="bar-fill"></div>
                </div>

                <!-- 4. Сегментированный бар (8 этапов) -->
                <div class="bar-segmented">
                    <div class="segment filled"></div>
                    <div class="segment filled"></div>
                    <div class="segment filled"></div>
                    <div class="segment filled"></div>
                    <div class="segment filled"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                </div>

            </div>
        </div>

        <!-- ПРАВЫЙ БЛОК: Кнопка меню (Bento Right) -->
        <div class="bento-panel header-right">
            <!-- Выпуклая кнопка из твоего UI-Кита -->
            <div class="menu-btn">
                <i data-lucide="menu"></i>
            </div>
        </div>

    </header>

    <script>
        // Инициализация иконок
        lucide.createIcons();
    </script>
</body>

</html>
