<!-- Desktop Header Template -->
<div id="desktop-header-template" class="content-header">
    <div class="header-control-slot" id="col-1">
        <!-- space for Logo/Back info -->
    </div>
    <div class="header-control-slot" id="col-2">
        <!-- Title / Breadcrumb eventually -->
    </div>
    <div class="header-control-slot" id="col-3-desktop">
        <!-- Desktop Menu Button placeholder -->
    </div>
    <div class="header-tools" id="col-4-desktop">
        <button class="btn btn-menu" id="menuBtn" type="button">
            <i data-lucide="menu"></i>
        </button>
        <button class="btn btn-back" id="backBtn" type="button">
            <i data-lucide="arrow-left"></i>
        </button>
    </div>
</div>

<!-- Mobile Footer Template (also serves responsive control functions) -->
<div id="mobile-footer-template" class="content-footer">
    <!-- Mobile placement copies columns -->
    <div class="header-control-slot" id="col-1-mobile"></div>
    <div class="header-control-slot" id="col-2-mobile"></div>
    <div class="header-control-slot" id="col-3-mobile"></div>
    <div class="header-control-slot" id="col-4-mobile"></div>
</div>
